# Nahui CI — Phase 1 baseline.
#
# For now this only builds, tests, and pushes an image. No SBOM, scan, signing,
# provenance, or attestation yet — that's intentional, it's the insecure
# starting point the later phases harden. The missing pieces are left as TODOs
# below so it's obvious what's still coming.

name: ci

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  REGISTRY: ghcr.io
  # Image name is computed per-run in the image job (owner lowercased + app
  # name), so a fork pushes to its own namespace instead of mine.

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -race -count=1

      - name: Build
        run: go build ./...

  image:
    name: Build, scan & push image
    needs: test
    runs-on: ubuntu-latest
    # Only publish on push to main / tags, not on PRs (esp. from forks).
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
      id-token: write      # OIDC token for cosign keyless signing (Fulcio/Rekor)
      attestations: write  # write SLSA provenance + SBOM attestations (Phase 4)
    steps:
      - uses: actions/checkout@v4

      - name: Derive version
        id: ver
        run: echo "version=$(git describe --tags --always --dirty)" >> "$GITHUB_OUTPUT"

      # GHCR requires lowercase, and we want forks to push to their own owner
      # namespace. github.repository_owner can contain uppercase, so lowercase
      # it (bash ${VAR,,}) and append the fixed app name.
      - name: Derive image name
        run: echo "IMAGE_NAME=${GITHUB_REPOSITORY_OWNER,,}/nahui-app" >> "$GITHUB_ENV"

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Build and load into the local daemon first (no push yet) so we can SBOM
      # and scan it before anything leaves the runner. A vulnerable image must
      # never reach the registry.
      - name: Build image (load for scanning)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      # Pillar 1: describe what's in the image (SPDX). Uploaded as a build
      # artifact so the SBOM is available alongside the run.
      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.version }}
          format: spdx-json
          output-file: nahui-app.spdx.json
          artifact-name: nahui-app-sbom.spdx.json

      # Gate: scan the image and FAIL the build on any critical CVE. This is what
      # stops a vulnerable artifact from being pushed.
      - name: Scan image (Grype)
        uses: anchore/scan-action@v6
        with:
          image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.version }}
          severity-cutoff: critical
          fail-build: true
          output-format: table

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Only reached if the scan passed. Re-runs from the buildx cache, so it's
      # cheap, and gives us the registry digest to sign by.
      - name: Push image
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            VERSION=${{ steps.ver.outputs.version }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.ver.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # Pillar 2: keyless-sign the image by digest. cosign uses the job's OIDC
      # token (no stored keys), gets a short-lived cert from Fulcio, and records
      # the signature in the Rekor transparency log. Signing the digest, not a
      # tag, so the signature is bound to exact content.
      - name: Sign image (keyless)
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: cosign sign --yes "${REGISTRY}/${IMAGE_NAME}@${DIGEST}"

      # Pillar 3: SLSA build provenance. GitHub's native artifact attestations
      # generate non-falsifiable provenance (SLSA Build L3) describing how/where
      # the image was built, sign it keyless, log it in Rekor, and push it to
      # the registry as an attestation bound to the image digest.
      - name: Attest build provenance (SLSA)
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

      # Attach the SBOM as a signed attestation too, so a verifier can confirm
      # the bill of materials came from this build and wasn't swapped.
      - name: Attest SBOM
        uses: actions/attest-sbom@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.push.outputs.digest }}
          sbom-path: nahui-app.spdx.json
          push-to-registry: true

      # The GitHub attestations above are the canonical, publicly-verifiable
      # record (Rekor + L3 provenance), but they're stored as OCI referrers,
      # which in-cluster verifiers like Kyverno don't discover. Publish the
      # SAME SBOM as a cosign-format attestation (stored as the .att tag) so the
      # admission policy can verify an SBOM attestation at deploy time.
      - name: Attest SBOM (cosign format, for in-cluster verification)
        env:
          DIGEST: ${{ steps.push.outputs.digest }}
        run: |
          cosign attest --yes --type spdxjson \
            --predicate nahui-app.spdx.json \
            "${REGISTRY}/${IMAGE_NAME}@${DIGEST}"
